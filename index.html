<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ОЛОЛО · ПЫЩПЫЩ ПЫЩ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    /* ── TOKENS ─────────────────────────────────── */
    :root {
      --cream:  #fdf8ec;
      --dark:   #1a1a3e;
      --yellow: #FFD54F;
      --orange: #FF8C42;
      --red:    #FF5B5B;
      --blue:   #4EB8FF;
      --green:  #42D87C;
      --sp-sm:  16px;
      --sp-md:  20px;
      --sp-lg:  52px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Fredoka One', sans-serif;
      background: var(--cream);
      color: var(--dark);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ── GRAIN OVERLAY ───────────────────────────── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 200;
      pointer-events: none;
      opacity: 0.055;
      mix-blend-mode: multiply;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    /* ── PAGE ────────────────────────────────────── */
    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--sp-md);
      padding: var(--sp-lg) var(--sp-sm);
      position: relative;
    }

    /* ── SPARKLES (fixed background) ────────────── */
    .sparkles {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    /* ── TITLE ───────────────────────────────────── */
    .title {
      font-family: 'Fredoka One', sans-serif;
      font-size: clamp(3rem, 9vw, 6rem);
      line-height: 1;
      letter-spacing: -0.02em;
      text-align: center;
      color: #FFD54F;
      /* cartoon outline via layered text-shadow */
      text-shadow:
         4px  4px 0 var(--dark),
        -4px  4px 0 var(--dark),
         4px -4px 0 var(--dark),
        -4px -4px 0 var(--dark),
         4px  0   0 var(--dark),
        -4px  0   0 var(--dark),
         0    4px 0 var(--dark),
         0   -4px 0 var(--dark);
      position: relative;
      z-index: 1;
      user-select: none;
      animation: title-bob 3s ease-in-out infinite;
    }

    .title .sub {
      display: block;
      font-size: 0.42em;
      color: var(--orange);
      letter-spacing: 0.04em;
      margin-top: 6px;
      text-shadow:
         3px  3px 0 var(--dark),
        -3px  3px 0 var(--dark),
         3px -3px 0 var(--dark),
        -3px -3px 0 var(--dark);
    }

    @keyframes title-bob {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-4px); }
    }

    /* ── UPYACHKA ────────────────────────────────── */
    .upyachka-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }

    .svg-wrapper {
      position: relative;
      width: 220px;
      height: 290px;
    }

    .upyachka-svg {
      animation: dance 1.6s ease-in-out infinite;
      filter:
        drop-shadow(0 14px 0px rgba(26,26,62,.12))
        drop-shadow(0 6px 20px rgba(26,26,62,.10));
      transition:
        filter 0.2s ease,
        opacity 0.1s ease;
    }

    .upyachka-wrap:hover .upyachka-svg {
      animation: kick 0.4s ease-in-out infinite;
      filter:
        drop-shadow(0 18px 0 rgba(26,26,62,.18))
        drop-shadow(0 8px 28px rgba(26,26,62,.16));
    }

    @keyframes dance {
      0%, 100% { transform: rotate(-3deg) translateY(0);   }
      25%       { transform: rotate(0deg)  translateY(-9px); }
      50%       { transform: rotate(3deg)  translateY(0);   }
      75%       { transform: rotate(0deg)  translateY(-6px); }
    }

    @keyframes kick {
      0%, 100% { transform: rotate(-5deg) translateY(-3px) scale(1.04); }
      50%       { transform: rotate(5deg)  translateY(3px)  scale(1.07); }
    }

    /* ── PISUNS ──────────────────────────────────── */
    .pisun {
      position: absolute;
      top: 185px;
      left: 185px;
      z-index: 10;
      pointer-events: none;
      animation: fly-pisun 0.75s ease-out infinite;
      opacity: 0;
    }

    .pisun.paused {
      animation-play-state: paused;
      opacity: 0 !important;
    }

    @keyframes fly-pisun {
      0%   { transform: translate(-50%,-50%) scale(.5); opacity: 1; }
      70%  { opacity: .7; }
      100% {
        transform: translate(calc(-50% + var(--ex)), calc(-50% + var(--ey)))
                   rotate(var(--rot)) scale(.6);
        opacity: 0;
      }
    }

    /* ── KICK LABEL ──────────────────────────────── */
    .kick-label {
      font-family: 'Fredoka One', sans-serif;
      font-size: 1.15rem;
      letter-spacing: 0.03em;
      color: var(--dark);
      background: #FFD54F;
      border: 3px solid var(--dark);
      border-radius: 100px;
      padding: 6px 18px;
      white-space: nowrap;
      animation: pop .22s cubic-bezier(.36,.07,.19,.97) both;
    }

    @keyframes pop {
      0%   { transform: scale(1.5); opacity: 0; }
      60%  { transform: scale(.96); }
      100% { transform: scale(1);   opacity: 1; }
    }

    /* ── INFO ZONE (kick label + counter) ───────── */
    .info-zone {
      position: relative;
      z-index: 1;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── COUNTER ─────────────────────────────────── */
    .counter {
      font-family: 'Fredoka One', sans-serif;
      font-size: 1.15rem;
      letter-spacing: 0.03em;
      color: var(--dark);
      background: #1a1a3e;
      color: #FFD54F;
      border-radius: 100px;
      padding: 8px 24px;
      border: 3px solid var(--dark);
      animation: pop .3s cubic-bezier(.36,.07,.19,.97) both;
    }

    /* ── BUTTONS ─────────────────────────────────── */
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-sm);
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .btn {
      font-family: 'Fredoka One', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.07em;
      padding: 13px 28px;
      border: 3.5px solid var(--dark);
      border-radius: 16px;
      cursor: pointer;
      color: var(--dark);
      position: relative;
      outline: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transform: translateY(0);
      transition:
        transform  0.14s cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow 0.14s ease;
    }

    .btn:hover  { transform: translateY(-4px); }
    .btn:active,
    .btn.pressed { transform: translateY(4px) !important; }

    .btn:focus-visible {
      outline: 3px solid var(--orange);
      outline-offset: 3px;
    }

    .btn-red {
      background: var(--red);
      box-shadow: 0 5px 0 var(--dark), 0 8px 18px rgba(255,91,91,.22);
    }
    .btn-red:hover { box-shadow: 0 9px 0 var(--dark), 0 12px 26px rgba(255,91,91,.32); }
    .btn-red.pressed, .btn-red:active { box-shadow: 0 1px 0 var(--dark) !important; }

    .btn-blue {
      background: var(--blue);
      box-shadow: 0 5px 0 var(--dark), 0 8px 18px rgba(78,184,255,.22);
    }
    .btn-blue:hover { box-shadow: 0 9px 0 var(--dark), 0 12px 26px rgba(78,184,255,.32); }
    .btn-blue.pressed, .btn-blue:active { box-shadow: 0 1px 0 var(--dark) !important; }

    .btn-green {
      background: var(--green);
      box-shadow: 0 5px 0 var(--dark), 0 8px 18px rgba(66,216,124,.22);
    }
    .btn-green:hover { box-shadow: 0 9px 0 var(--dark), 0 12px 26px rgba(66,216,124,.32); }
    .btn-green.pressed, .btn-green:active { box-shadow: 0 1px 0 var(--dark) !important; }

    @media (max-width: 480px) {
      .title { font-size: clamp(1rem, 6vw, 1.5rem); }
      .btn   { font-size: .95rem; padding: 11px 20px; }
    }
  </style>
</head>

        <line x1="84"  y1="185" x2="34" y2="158"

        <line id="armNormF" x1="136" y1="185" x2="186" y2="158"

</div><!-- end page -->

<script>
  const upyachka    = document.getElementById('upyachka');
  const kickLabel   = document.getElementById('kickLabel');
  const counter     = document.getElementById('counter');
  const pisuns      = ['p0','p1','p2'].map(id => document.getElementById(id));
  const eyebrows    = document.getElementById('eyebrows');
  const mouthHappy  = document.getElementById('mouthHappy');
  const mouthAngry  = document.getElementById('mouthAngry');
  const legNorm     = document.getElementById('legNorm');
  const legNormF    = document.getElementById('legNormF');
  const legKick     = document.getElementById('legKick');
  const legKickF    = document.getElementById('legKickF');
  const armNorm     = document.getElementById('armNorm');
  const armNormF    = document.getElementById('armNormF');
  const armKick     = document.getElementById('armKick');
  const armKickF    = document.getElementById('armKickF');
  const footNorm    = document.getElementById('footNorm');
  const footKick    = document.getElementById('footKick');
  const handNorm    = document.getElementById('handNorm');
  const handKick    = document.getElementById('handKick');

  let clicks = 0;

  function show(el)  { el.style.display = ''; }
  function hide(el)  { el.style.display = 'none'; }

  function setHover(on) {
    on ? show(eyebrows)   : hide(eyebrows);
    on ? hide(mouthHappy) : show(mouthHappy);
    on ? show(mouthAngry) : hide(mouthAngry);
    on ? hide(legNorm)    : show(legNorm);
    on ? hide(legNormF)   : show(legNormF);
    on ? show(legKick)    : hide(legKick);
    on ? show(legKickF)   : hide(legKickF);
    on ? hide(armNorm)    : show(armNorm);
    on ? hide(armNormF)   : show(armNormF);
    on ? show(armKick)    : hide(armKick);
    on ? show(armKickF)   : hide(armKickF);
    on ? hide(footNorm)   : show(footNorm);
    on ? show(footKick)   : hide(footKick);
    on ? hide(handNorm)   : show(handNorm);
    on ? show(handKick)   : hide(handKick);
    // kick label в info-zone — показываем/скрываем, counter скрываем при hover
    if (on) { show(kickLabel); hide(counter); }
    else     { hide(kickLabel); if (clicks > 0) show(counter); }
    pisuns.forEach(p => p.classList.toggle('paused', !on));
  }

  upyachka.addEventListener('mouseenter', () => setHover(true));
  upyachka.addEventListener('mouseleave', () => setHover(false));

  // Правильное склонение: 1 раз, 2 раза, 5 раз, 11 раз, 21 раз, 22 раза...
  function razDecl(n) {
    const mod10  = n % 10;
    const mod100 = n % 100;
    if (mod100 >= 11 && mod100 <= 14) return 'раз';
    if (mod10 === 1) return 'раз';
    if (mod10 >= 2 && mod10 <= 4)    return 'раза';
    return 'раз';
  }

  function pressBtn(btn) {
    btn.classList.add('pressed');
    clicks++;
    counter.textContent = `нажато ${clicks} ${razDecl(clicks)}! 🔥`;
    counter.style.display = '';
    // re-trigger animation
    counter.style.animation = 'none';
    void counter.offsetWidth;
    counter.style.animation = '';
    setTimeout(() => btn.classList.remove('pressed'), 150);
  }

  ['btnA','btnB','btnC'].forEach(id => {
    document.getElementById(id)
      .addEventListener('pointerdown', e => pressBtn(e.currentTarget));
  });
</script>
</body>
</html>
